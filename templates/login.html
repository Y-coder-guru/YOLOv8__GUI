{% extends 'base.html' %}
{% block title %}登录{% endblock %}
{% block content %}
<div class="auth-card card mx-auto mt-5 p-4 shadow-sm">
  <h3 class="mb-4 text-center">登录监控系统</h3>
  <form method="post">
    <div class="mb-3">
      <label class="form-label">用户名</label>
      <input type="text" name="username" class="form-control" required>
    </div>
    <div class="mb-3">
      <label class="form-label">密码</label>
      <input type="password" name="password" class="form-control" required>
    </div>
    <div class="form-check mb-3">
      <input class="form-check-input" type="checkbox" name="remember" id="remember" checked>
      <label class="form-check-label" for="remember">记住登录状态</label>
    </div>
    <button class="btn btn-primary w-100">登录</button>
  </form>
  <p class="mt-3 mb-0 text-center">没有账号？<a href="{{ url_for('register') }}">前往注册</a></p>
</div>
{% endblock %}

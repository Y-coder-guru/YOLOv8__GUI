{% extends 'base.html' %}
{% block title %}个人中心{% endblock %}
{% block content %}
<h2>个人中心</h2>
<div class="card p-3">
  <p>用户名：{{ current_user.username }}</p>
  <p>角色：{{ '管理员' if current_user.is_admin else '普通用户' }}</p>
  <p>注册时间：{{ current_user.created_at.strftime('%Y-%m-%d %H:%M:%S') }}</p>
  <hr>
  <h5>账号安全</h5>
  <p class="text-muted">如需修改密码请联系管理员（示例实现）。</p>
</div>
{% endblock %}

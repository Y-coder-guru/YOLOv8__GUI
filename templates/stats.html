{% extends 'base.html' %}
{% block title %}数据统计{% endblock %}
{% block content %}
<h2 class="mb-3">数据统计与动态图表</h2>
<div class="row g-3 mb-3">
  <div class="col-md-3"><div class="card p-3 metric-card"><div>今日检测事件数</div><h4 id="cardEvents">0</h4></div></div>
  <div class="col-md-3"><div class="card p-3 metric-card"><div>今日检测目标数</div><h4 id="cardObjects">0</h4></div></div>
  <div class="col-md-3"><div class="card p-3 metric-card"><div>今日在线用户数</div><h4 id="cardUsers">0</h4></div></div>
  <div class="col-md-3"><div class="card p-3 metric-card"><div>摄像头状态</div><h4 id="cardCamera">离线</h4></div></div>
</div>
<div class="card p-3 mb-3 panel-anim">
  <div class="row g-2 align-items-end">
    <div class="col-md-3"><label class="form-label">范围</label><select class="form-select" id="rangeType"><option value="today">今日</option><option value="yesterday">昨日</option><option value="7d">近7天</option><option value="30d">近30天</option><option value="custom">自定义</option></select></div>
    <div class="col-md-3"><label class="form-label">开始时间</label><input type="datetime-local" step="1" class="form-control" id="startTime"></div>
    <div class="col-md-3"><label class="form-label">结束时间</label><input type="datetime-local" step="1" class="form-control" id="endTime"></div>
    <div class="col-md-3"><label class="form-label">类别</label><select class="form-select" id="categoryFilter"><option value="">全部类别</option></select></div>
  </div>
  <div class="mt-2 d-flex gap-2 flex-wrap">
    <button class="btn btn-primary" id="refreshBtn">刷新数据</button>
    <button class="btn btn-outline-secondary" id="exportCsvBtn">导出 CSV</button>
    <button class="btn btn-outline-secondary" id="exportExcelBtn">导出 Excel</button>
    <button class="btn btn-outline-secondary" id="exportJsonBtn">导出 JSON</button>
    <button class="btn btn-danger" id="clearDataBtn">清空数据</button>
  </div>
</div>
<div class="row g-3">
  <div class="col-lg-6"><div class="card p-3"><h6>检测数量趋势</h6><div id="lineChart" style="height:340px;"></div></div></div>
  <div class="col-lg-6"><div class="card p-3"><h6>类别占比</h6><div id="pieChart" style="height:340px;"></div></div></div>
  <div class="col-12"><div class="card p-3"><h6>类别对比</h6><div id="barChart" style="height:360px;"></div></div></div>
</div>
{% endblock %}
{% block scripts %}
<script src="{{ url_for('static', filename='js/stats.js') }}"></script>
{% endblock %}

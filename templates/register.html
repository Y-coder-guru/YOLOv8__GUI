{% extends 'base.html' %}
{% block title %}注册{% endblock %}
{% block content %}
<div class="auth-card card mx-auto mt-5 p-4 shadow-sm">
  <h3 class="mb-4 text-center">用户注册</h3>
  <form method="post">
    <div class="mb-3">
      <label class="form-label">用户名</label>
      <input type="text" name="username" class="form-control" required>
    </div>
    <div class="mb-3">
      <label class="form-label">密码（至少6位）</label>
      <input type="password" name="password" class="form-control" required minlength="6">
    </div>
    <div class="mb-3">
      <label class="form-label">确认密码</label>
      <input type="password" name="confirm_password" class="form-control" required minlength="6">
    </div>
    <button class="btn btn-success w-100">注册</button>
  </form>
  <p class="mt-3 mb-0 text-center">已有账号？<a href="{{ url_for('login') }}">返回登录</a></p>
</div>
{% endblock %}

{% extends 'base.html' %}
{% block title %}实时监控{% endblock %}
{% block content %}
<h2 class="mb-3">实时监控</h2>
<div class="row g-3">
  <div class="col-xl-8">
    <div class="video-panel card p-3 panel-anim h-100">
      <div class="d-flex gap-2 flex-wrap mb-3 align-items-center monitor-toolbar monitor-actions">
        <select class="form-select toolbar-select" id="cameraType">
          <option value="local">本地摄像头</option>
          <option value="openmv">OpenMV 摄像头（串口）</option>
        </select>
        <button class="btn btn-primary uniform-btn" id="openCameraBtn">打开摄像头</button>
        <button class="btn btn-outline-secondary uniform-btn" id="closeCameraBtn">关闭摄像头</button>
        <button class="btn btn-success uniform-btn" id="startDetBtn">开始检测</button>
        <button class="btn btn-outline-danger uniform-btn" id="stopDetBtn">停止检测</button>
      </div>

      <div class="openmv-panel mb-3 d-none" id="openmvPanel">
        <div class="row g-2 align-items-end">
          <div class="col-md-3"><label class="form-label">连接方式</label><select class="form-select" id="openmvMode"><option value="serial">串口</option><option value="network">网络</option></select></div>
          <div class="col-md-3"><label class="form-label">目标地址</label><input class="form-control" id="openmvTarget" placeholder="串口号或 IP:PORT" value="COM3"></div>
          <div class="col-md-3"><label class="form-label">波特率</label><input class="form-control" id="baudrate" type="number" value="115200"></div>
          <div class="col-md-3 d-flex gap-2 flex-wrap">
            <button class="btn btn-outline-primary" id="scanPortBtn">扫描端口</button>
            <button class="btn btn-primary" id="connectOpenmvBtn">连接</button>
            <button class="btn btn-outline-danger" id="disconnectOpenmvBtn">断开</button>
          </div>
        </div>
        <div class="small text-muted mt-2" id="openmvConnStatus">连接状态：未连接 | 视频端口：--</div>
      </div>

      <div class="video-wrap" id="videoWrap">
        <button class="btn btn-dark icon-btn" id="fullscreenBtn" title="全屏切换">📤</button>
        <video id="video" autoplay playsinline muted></video>
        <img id="openmvImage" class="d-none" alt="openmv stream" />
        <canvas id="overlay"></canvas>
      </div>

      <div class="row g-2 mt-2">
        <div class="col-md-4"><div class="mini-card">今日检测时长：<span id="todayDuration">00:00:00</span></div></div>
        <div class="col-md-4"><div class="mini-card">在线用户：<span id="onlineUsers">0</span></div></div>
        <div class="col-md-4"><div class="mini-card">摄像头连接状态：<span id="cameraStateMini">离线</span></div></div>
      </div>
    </div>
  </div>

  <div class="col-xl-4">
    <div class="card p-3 panel-anim h-100">
      <h5 class="mb-2">实时统计与参数</h5>
      <ul class="list-group mb-3" id="countList"></ul>
      <div class="mini-card-block mb-2">
        <div class="small" id="statusText">状态：待机</div>
        <div class="small" id="cameraMeta">类型：- | 分辨率：- | 帧率：-</div>
        <div class="small" id="perfMeta">推理耗时：-</div>
      </div>
      <hr>
      <div class="row g-2">
        <div class="col-6"><label class="form-label small">分辨率</label><select class="form-select form-select-sm" id="cfgResolution"><option>QVGA</option><option>VGA</option><option selected>720P</option><option>1080P</option></select></div>
        <div class="col-6"><label class="form-label small">帧率(FPS)</label><input type="number" min="1" max="120" class="form-control form-control-sm" id="cfgFps" value="15"></div>
        <div class="col-6"><label class="form-label small">曝光</label><input type="number" class="form-control form-control-sm" id="cfgExposure" value="50"></div>
        <div class="col-6"><label class="form-label small">增益</label><input type="number" step="0.1" class="form-control form-control-sm" id="cfgGain" value="1"></div>
        <div class="col-6"><label class="form-label small">波特率</label><input type="number" class="form-control form-control-sm" id="cfgBaudrate" value="115200"></div>
        <div class="col-6"><label class="form-label small">超时(ms)</label><input type="number" class="form-control form-control-sm" id="cfgTimeout" value="800"></div>
        <div class="col-12 d-flex justify-content-between align-items-center mt-1">
          <div class="form-check form-switch small m-0">
            <input class="form-check-input" type="checkbox" id="cfgAwb" checked>
            <label class="form-check-label" for="cfgAwb">自动白平衡</label>
          </div>
          <div class="d-flex gap-2">
            <div class="form-check form-check-inline small m-0">
              <input class="form-check-input" type="checkbox" id="cfgFlipH">
              <label class="form-check-label" for="cfgFlipH">水平翻转</label>
            </div>
            <div class="form-check form-check-inline small m-0">
              <input class="form-check-input" type="checkbox" id="cfgFlipV">
              <label class="form-check-label" for="cfgFlipV">垂直翻转</label>
            </div>
          </div>
        </div>
        <div class="col-12"><button class="btn btn-outline-primary w-100 uniform-btn" id="applyCameraCfgBtn">应用摄像头参数</button></div>
      </div>
      <div class="mini-card-block mt-2">
        <div class="small" id="cfgMeta1">波特率：- | 曝光：- | 增益：-</div>
        <div class="small" id="cfgMeta2">超时：- | 自动白平衡：- | 镜像：-</div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script src="{{ url_for('static', filename='js/monitor.js') }}"></script>
{% endblock %}

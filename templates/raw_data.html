{% extends 'base.html' %}
{% block title %}原始数据{% endblock %}
{% block content %}
<h2 class="mb-3">原始检测数据</h2>
<div class="card p-3 mb-3">
  <div class="row g-2 align-items-end">
    <div class="col-md-3"><label class="form-label">页码</label><input class="form-control" id="rawPage" type="number" min="1" value="1"></div>
    <div class="col-md-3"><label class="form-label">每页条数</label><input class="form-control" id="rawPageSize" type="number" min="1" max="100" value="20"></div>
    <div class="col-md-6 d-flex gap-2 flex-wrap">
      <button class="btn btn-primary uniform-btn" id="rawRefreshBtn">刷新</button>
      <button class="btn btn-outline-secondary uniform-btn" id="rawCopyBtn">复制 JSON</button>
    </div>
  </div>
</div>

<div class="card p-3 mb-3 table-responsive">
  <table class="table table-striped" id="rawTable">
    <thead>
      <tr><th>ID</th><th>时间</th><th>类别</th><th>数量</th><th>置信度</th><th>操作人</th><th>操作类型</th></tr>
    </thead>
    <tbody></tbody>
  </table>
  <small id="rawSummary" class="text-muted">共 0 条</small>
</div>

<div class="card p-3">
  <h6>JSON 预览</h6>
  <pre class="mb-0" id="rawJson" style="max-height:420px;overflow:auto;">[]</pre>
</div>
{% endblock %}
{% block scripts %}
<script src="{{ url_for('static', filename='js/raw_data.js') }}"></script>
{% endblock %}
